name: Build and Publish to AUR

on:
  schedule:
    # Run daily at 00:00 UTC
    - cron: '0 0 * * *'
  push:
    branches:
      - main
    paths:
      - 'pkgs/*/PKGBUILD'
  workflow_dispatch:
    inputs:
      package:
        description: 'Specific package (leave empty for all)'
        required: false
        type: string
      force:
        description: 'Force update even if version unchanged'
        required: false
        type: boolean
        default: false
      skip_publish:
        description: 'Skip AUR publishing (dry-run)'
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  check-and-prepare:
    runs-on: ubuntu-latest
    outputs:
      packages: ${{ steps.determine.outputs.packages }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Install dependencies
        if: github.event_name != 'push'
        run: |
          sudo apt-get update
          sudo apt-get install -y curl jq

      - name: Determine packages to build
        id: determine
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "push" ]]; then
            # Push trigger: detect changed packages
            changed_files=$(git diff --name-only HEAD^ HEAD || git diff --name-only HEAD)
            packages=$(echo "${changed_files}" | grep -E '^pkgs/[^/]+/(PKGBUILD|\.SRCINFO)$' | cut -d'/' -f2 | sort -u | jq -R -s -c 'split("\n")[:-1]')
            echo "packages=${packages}" >> "${GITHUB_OUTPUT}"
            echo "Push trigger: building changed packages: ${packages}"
            exit 0
          fi

          # Schedule or manual trigger: check upstream updates
          if [[ -n "${{ github.event.inputs.package }}" ]]; then
            all_packages='["${{ github.event.inputs.package }}"]'
          else
            all_packages=$(find pkgs -mindepth 1 -maxdepth 1 -type d -exec basename {} \; | sort | jq -R -s -c 'split("\n")[:-1]')
          fi

          force_flag=""
          if [[ "${{ github.event.inputs.force }}" == "true" ]]; then
            force_flag="--force"
          fi

          updated_packages=()

          for pkg in $(echo "${all_packages}" | jq -r '.[]'); do
            echo "Checking ${pkg}..."
            if scripts/update-package.sh "${pkg}" ${force_flag}; then
              if git diff --quiet "pkgs/${pkg}/PKGBUILD" 2>/dev/null; then
                if [[ -n "${force_flag}" ]]; then
                  echo "No file changes but force mode: including ${pkg}"
                  updated_packages+=("${pkg}")
                else
                  echo "No changes detected for ${pkg}"
                fi
              else
                echo "Updates detected for ${pkg}"
                updated_packages+=("${pkg}")
              fi
            else
              echo "Failed to check ${pkg}" >&2
            fi
          done

          if [[ ${#updated_packages[@]} -eq 0 ]]; then
            echo "No package updates found"
            echo "packages=[]" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          # Regenerate README with updated package versions
          echo "Regenerating README files..."
          bash scripts/build-readme.sh

          # Commit updates
          for pkg in "${updated_packages[@]}"; do
            git add "pkgs/${pkg}/PKGBUILD"
            new_version=$(awk -F'= *' '$1=="pkgver"{print $2; exit}' "pkgs/${pkg}/PKGBUILD")
            git add README.md README.zh.md docs/readme.en.md 2>/dev/null || true
            if git diff --cached --quiet; then
              echo "Nothing to commit for ${pkg} (force mode), skipping commit"
            else
              git commit -m "ci: update ${pkg} to ${new_version}

          Automated upstream version detection.

          Co-Authored-By: github-actions[bot] <github-actions[bot]@users.noreply.github.com>"
            fi
          done

          # Pull and push only if there are new commits
          if ! git diff --quiet origin/main HEAD; then
            if ! git pull --rebase origin main; then
              echo "Failed to rebase, attempting merge" >&2
              git rebase --abort || true
              git pull --no-rebase origin main
            fi
            git push origin main
          fi

          echo "Successfully committed updates for: ${updated_packages[*]}"

          # Output updated packages
          packages_json=$(printf '%s\n' "${updated_packages[@]}" | jq -R -s -c 'split("\n")[:-1]')
          echo "packages=${packages_json}" >> "${GITHUB_OUTPUT}"

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: check-logs-${{ github.run_id }}
          path: |
            *.log
          retention-days: 30
          if-no-files-found: ignore

  build-and-validate:
    needs: check-and-prepare
    if: needs.check-and-prepare.outputs.packages != '[]'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        package: ${{ fromJson(needs.check-and-prepare.outputs.packages) }}
      fail-fast: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Build and validate package
        run: |
          set -euo pipefail

          pkg_dir="pkgs/${{ matrix.package }}"
          echo "Building and validating ${pkg_dir}..."

          docker run --rm \
            -v "$(pwd):/workspace" \
            -w /workspace \
            archlinux:latest \
            bash -lc '
              set -euo pipefail
              pacman -Syu --noconfirm --needed base-devel namcap curl git fcitx5 pipewire systemd-libs sudo
              useradd -m builder
              printf "builder ALL=(ALL) NOPASSWD: ALL\n" > /etc/sudoers.d/builder
              chmod 440 /etc/sudoers.d/builder
              chown -R builder:builder /workspace
              su - builder -c "
                set -euo pipefail
                cd /workspace/'"${pkg_dir}"'
                makepkg -s --noconfirm
                makepkg --printsrcinfo > .SRCINFO
                namcap PKGBUILD .SRCINFO || true
              "
            '

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.package }}-logs-${{ github.run_id }}
          path: |
            pkgs/${{ matrix.package }}/*.log
            pkgs/${{ matrix.package }}/src/
          retention-days: 30
          if-no-files-found: ignore

  publish-to-aur:
    needs: [check-and-prepare, build-and-validate]
    if: needs.check-and-prepare.outputs.packages != '[]' && github.event.inputs.skip_publish != 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        package: ${{ fromJson(needs.check-and-prepare.outputs.packages) }}
      fail-fast: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Generate .SRCINFO
        run: |
          pkg_dir="pkgs/${{ matrix.package }}"
          echo "Generating .SRCINFO for ${{ matrix.package }}..."
          docker run --rm \
            -v "$(pwd)/${pkg_dir}:/pkg" \
            -w /pkg \
            archlinux:latest \
            bash -c "
              pacman -Sy --noconfirm base-devel && \
              useradd -m builder && \
              chown -R builder:builder /pkg && \
              su - builder -c 'cd /pkg && makepkg --printsrcinfo > .SRCINFO'
            "

          if [[ ! -f "${pkg_dir}/.SRCINFO" ]]; then
            echo "Failed to generate .SRCINFO"
            exit 1
          fi
          echo ".SRCINFO generated successfully"

      - name: Get package version
        id: pkgver
        run: |
          pkg_dir="pkgs/${{ matrix.package }}"
          pkgver=$(awk -F'= *' '$1=="pkgver"{print $2; exit}' "${pkg_dir}/PKGBUILD")
          echo "version=${pkgver}" >> "${GITHUB_OUTPUT}"

      - name: Prepare assets list
        id: assets
        run: |
          set -euo pipefail

          pkg_dir="pkgs/${{ matrix.package }}"
          assets="${pkg_dir}/.SRCINFO"

          shopt -s nullglob
          for pattern in "*.install" "*.patch" "*.sh" "*.service"; do
            for file in "${pkg_dir}"/${pattern}; do
              if [[ -f "${file}" ]]; then
                assets="${assets}"$'\n'"${file}"
              fi
            done
          done

          {
            echo "list<<EOF"
            echo "${assets}"
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

      - name: Publish to AUR
        env:
          AUR_SSH_KEY: ${{ secrets.AUR_SSH_KEY }}
        run: |
          set -euo pipefail

          pkg="${{ matrix.package }}"
          pkg_dir="pkgs/${pkg}"
          repo_dir="$(mktemp -d)"

          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${AUR_SSH_KEY}" > ~/.ssh/aur
          chmod 600 ~/.ssh/aur

          for i in 1 2 3; do
            if ssh-keyscan -t rsa,ecdsa,ed25519 aur.archlinux.org >> ~/.ssh/known_hosts 2>/dev/null; then
              break
            fi
            if [[ "${i}" -eq 3 ]]; then
              echo "ssh-keyscan failed after retries" >&2
              exit 1
            fi
            sleep $((i * 5))
          done
          chmod 600 ~/.ssh/known_hosts

          export GIT_SSH_COMMAND="ssh -i ~/.ssh/aur -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes"

          for i in 1 2 3; do
            if git clone "aur@aur.archlinux.org:${pkg}.git" "${repo_dir}/${pkg}"; then
              break
            fi
            if [[ "${i}" -eq 3 ]]; then
              echo "Failed to clone AUR repository after retries" >&2
              exit 1
            fi
            rm -rf "${repo_dir:?}/${pkg}"
            sleep $((i * 10))
          done

          cd "${repo_dir}/${pkg}"
          find . -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          cp "${GITHUB_WORKSPACE}/${pkg_dir}/PKGBUILD" .

          while IFS= read -r asset; do
            [[ -n "${asset}" ]] || continue
            cp "${GITHUB_WORKSPACE}/${asset}" .
          done <<'EOF'
          ${{ steps.assets.outputs.list }}
          EOF

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if git diff --quiet --exit-code && git diff --cached --quiet --exit-code; then
            echo "No AUR changes to publish for ${pkg}"
            exit 0
          fi

          git add .
          if git diff --cached --quiet; then
            echo "No staged AUR changes for ${pkg}"
            exit 0
          fi

          git commit -m "Update to ${{ steps.pkgver.outputs.version }}

          Automated build and publish via GitHub Actions.

          Co-Authored-By: github-actions[bot] <github-actions[bot]@users.noreply.github.com>"

          for i in 1 2 3; do
            if git push origin HEAD; then
              break
            fi
            if [[ "${i}" -eq 3 ]]; then
              echo "Failed to push AUR changes after retries" >&2
              exit 1
            fi
            sleep $((i * 10))
          done
